<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>edifact-validator</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sometype+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link href="edifact-validator.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script>
        window.ls = {
            get: (k) => localStorage.getItem(k),
            set: (k, v) => localStorage.setItem(k, v),
            del: (k) => localStorage.removeItem(k)
        };

        // ── Drag & Drop upload ────────────────────────────────────────────────
        window.initDropZone = function(zoneId, inputId) {
            const zone  = document.getElementById(zoneId);
            const input = document.getElementById(inputId);
            if (!zone || !input || zone._dropInit) return;
            zone._dropInit = true;

            // input has pointer-events:none — zone handles everything
            zone.style.cursor = 'pointer';

            zone.addEventListener('click', () => input.click());

            zone.addEventListener('dragenter', e => { e.preventDefault(); zone.classList.add('drag-over'); });
            zone.addEventListener('dragleave', e => {
                // only remove when leaving the zone itself, not a child
                if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
            });
            zone.addEventListener('dragover', e => e.preventDefault());
            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                const dt = new DataTransfer();
                for (const f of e.dataTransfer.files) dt.items.add(f);
                if (dt.files.length) {
                    input.files = dt.files;
                    input.dispatchEvent(new Event('change', { bubbles: true }));
                }
            });
        };

        // ── File download helper ──────────────────────────────────────────────
        window.downloadFile = (name, content, mime) => {
            const b = new Blob([content], { type: mime });
            const u = URL.createObjectURL(b);
            const a = Object.assign(document.createElement('a'), { href: u, download: name });
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(u);
        };

        // ── Scroll helper ─────────────────────────────────────────────────────
        window.scrollToId = id => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // ── IndexedDB history store ───────────────────────────────────────────
        window.idb = (() => {
            let _db = null;
            const DB = 'edi_validator', STORE = 'history', VER = 1;

            function openDb() {
                return new Promise((res, rej) => {
                    if (_db) { res(_db); return; }
                    const r = indexedDB.open(DB, VER);
                    r.onupgradeneeded = e => {
                        const s = e.target.result.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
                        s.createIndex('ts', 'timestamp');
                    };
                    r.onsuccess = e => { _db = e.target.result; res(_db); };
                    r.onerror   = e => rej(e.target.error);
                });
            }

            return {
                async add(rec) {
                    const db = await openDb();
                    const r = Object.assign({}, rec);
                    if (!r.id) delete r.id; // let IndexedDB auto-generate the key
                    return new Promise((res, rej) => {
                        const t = db.transaction(STORE, 'readwrite');
                        t.oncomplete = res; t.onerror = e => rej(e.target.error);
                        t.objectStore(STORE).add(r);
                    });
                },
                async getRecent(n) {
                    const db = await openDb();
                    return new Promise((res, rej) => {
                        const out = [];
                        const cur = db.transaction(STORE, 'readonly').objectStore(STORE)
                                      .index('ts').openCursor(null, 'prev');
                        cur.onsuccess = e => {
                            const c = e.target.result;
                            if (c && out.length < n) { out.push(c.value); c.continue(); }
                            else res(out);
                        };
                        cur.onerror = e => rej(e.target.error);
                    });
                },
                async count() {
                    const db = await openDb();
                    return new Promise((res, rej) => {
                        const r = db.transaction(STORE, 'readonly').objectStore(STORE).count();
                        r.onsuccess = e => res(e.target.result);
                        r.onerror   = e => rej(e.target.error);
                    });
                },
                async clear() {
                    const db = await openDb();
                    return new Promise((res, rej) => {
                        const t = db.transaction(STORE, 'readwrite');
                        t.oncomplete = res; t.onerror = e => rej(e.target.error);
                        t.objectStore(STORE).clear();
                    });
                },
                async exportCsv() {
                    const db = await openDb();
                    const all = await new Promise((res, rej) => {
                        const out = [];
                        const cur = db.transaction(STORE, 'readonly').objectStore(STORE)
                                      .index('ts').openCursor(null, 'prev');
                        cur.onsuccess = e => { const c = e.target.result; if (c) { out.push(c.value); c.continue(); } else res(out); };
                        cur.onerror   = e => rej(e.target.error);
                    });
                    const hdr = ['Zeitpunkt','Dateiname','Verkäufer','Verkäufer GLN','Test','Gültig','Fehler','Warnungen'];
                    const rows = all.map(r => [
                        r.timestamp, r.fileName||'', r.sellerName||'', r.sellerGln||'',
                        r.isTest?'Ja':'Nein', r.isValid?'Ja':'Nein', r.errorCount||0, r.warningCount||0
                    ]);
                    return [hdr, ...rows]
                        .map(r => r.map(c => '"' + String(c??'').replace(/"/g,'""') + '"').join(';'))
                        .join('\r\n');
                }
            };
        })();
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
